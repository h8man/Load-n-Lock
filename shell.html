<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="L&L.ico">
    <link rel="icon" type="image/png" sizes="256x256" href="L&L.png">
    <link rel="apple-touch-icon" href="L&L.png">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#10141c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Load &amp; Lock</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: radial-gradient(circle at top, #1a2330 0%, #10141c 60%);
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            touch-action: none;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
            background: #000;
            touch-action: none;
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(18, 20, 28, 0.82);
            z-index: 10;
        }

        #start-panel {
            width: min(90vw, 520px);
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(38, 42, 54, 0.96), rgba(18, 20, 28, 0.96));
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            color: #f3f4f6;
            text-align: center;
        }

        #start-panel h1 {
            margin: 0 0 12px;
            font-size: 32px;
        }

        #start-panel p {
            margin: 0 0 24px;
            color: #d7dfeb;
            line-height: 1.5;
        }

        #start-button {
            border: 0;
            border-radius: 999px;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            background: #22C55E;
            cursor: pointer;
        }

        #start-button:hover {
            background: #4ADE80;
        }

        #start-status {
            min-height: 24px;
            margin-top: 18px;
            color: #ffd27a;
            font-size: 14px;
        }

        #touch-controls {
            position: fixed;
            inset: auto 0 clamp(64px, min(9.375vw, 13.333vh), 120px) 0;
            display: none;
            justify-content: space-between;
            align-items: end;
            gap: 20px;
            padding: 20px;
            z-index: 5;
            pointer-events: none;
            box-sizing: border-box;
        }

        #touch-controls.visible {
            display: flex;
        }

        #touch-controls.mirrored {
            flex-direction: row-reverse;
        }

        #touch-dpad,
        #touch-actions {
            pointer-events: auto;
        }

        #touch-dpad {
            display: grid;
            grid-template-columns: 64px 64px 64px;
            grid-template-rows: 64px 64px 64px;
            gap: 10px;
        }

        #touch-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(64px, 78px));
            gap: 10px;
            align-content: end;
        }

        #touch-actions .touch-button {
            min-height: 64px;
        }

        #touch-mirror {
            min-height: 64px;
        }

        .touch-spacer {
            width: 64px;
            height: 64px;
        }

        .touch-button {
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(38, 42, 54, 0.96), rgba(18, 20, 28, 0.96));
            color: #f3f4f6;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .touch-button.touch-small {
            font-size: 16px;
        }

        .touch-button.touch-active,
        .touch-button:active {
            background: linear-gradient(180deg, rgba(74, 222, 128, 0.96), rgba(34, 197, 94, 0.96));
            color: #111827;
        }

        @media (max-width: 720px) {
            #touch-controls {
                padding: 14px;
                gap: 14px;
            }

            #touch-dpad {
                grid-template-columns: 56px 56px 56px;
                grid-template-rows: 56px 56px 56px;
                gap: 8px;
            }

            #touch-actions {
                grid-template-columns: repeat(2, minmax(64px, 78px));
                gap: 8px;
            }

            #touch-actions .touch-button {
                min-height: 64px;
            }

            .touch-spacer {
                width: 56px;
                height: 56px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    <div id="start-overlay">
        <div id="start-panel">
            <h1>Load &amp; Lock</h1>
            <p>Click to start the game and enable audio in the browser.</p>
            <button id="start-button" type="button">Press to Start</button>
            <div id="start-status">Loading...</div>
        </div>
    </div>
    <div id="touch-controls" class="mirrored" aria-label="Touch controls">
        <div id="touch-dpad">
            <div class="touch-spacer"></div>
            <button class="touch-button" type="button" data-key="ArrowUp" aria-label="Move up">▲</button>
            <div class="touch-spacer"></div>

            <button class="touch-button" type="button" data-key="ArrowLeft" aria-label="Move left">◀</button>
            <div class="touch-spacer"></div>
            <button class="touch-button" type="button" data-key="ArrowRight" aria-label="Move right">▶</button>

            <div class="touch-spacer"></div>
            <button class="touch-button" type="button" data-key="ArrowDown" aria-label="Move down">▼</button>
            <div class="touch-spacer"></div>
        </div>

        <div id="touch-actions">
            <button class="touch-button touch-small" type="button" data-key="KeyG" aria-label="Toggle graphics">Graphics</button>
            <button id="touch-mirror" class="touch-button touch-small" type="button" aria-label="Mirror controls" aria-pressed="true">Mirror</button>
            <button class="touch-button touch-small" type="button" data-key="KeyP" aria-label="Previous level">Prev</button>
            <button class="touch-button touch-small" type="button" data-key="KeyN" aria-label="Next level">Next</button>
            <button class="touch-button touch-small" type="button" data-key="KeyR" aria-label="Reset level">Reset</button>
            <button class="touch-button touch-small" type="button" data-key="KeyQ" aria-label="Quit game">Quit</button>
        </div>
    </div>

    <script src="touch-controls.js"></script>
    <script>
        const startOverlay = document.getElementById("start-overlay");
        const startPanelTitle = document.querySelector("#start-panel h1");
        const startPanelMessage = document.querySelector("#start-panel p");
        const startButton = document.getElementById("start-button");
        const startStatus = document.getElementById("start-status");
        const canvas = document.getElementById("canvas");
        const touchControls = document.getElementById("touch-controls");
        const touchButtons = Array.from(document.querySelectorAll("#touch-controls .touch-button[data-key]"));
        const mirrorButton = document.getElementById("touch-mirror");

        let runtimeReady = false;
        let startRequested = false;
        let mainStarted = false;
        let touchRegisteredForFullscreen = false;
        const touchControlsApi = window.createTouchControls({
            canvas,
            touchControls,
            touchButtons
        });

        mirrorButton.addEventListener("click", () => {
            const mirrored = touchControls.classList.toggle("mirrored");
            mirrorButton.setAttribute("aria-pressed", String(mirrored));
        });

        startButton.dataset.mode = "start";

        const showReloadOverlay = () => {
            touchControlsApi.setEnabled(false);
            startPanelTitle.textContent = "Load & Lock";
            startPanelMessage.textContent = "The game has closed. Reload the page to start again.";
            startButton.textContent = "Reload";
            startButton.dataset.mode = "reload";
            startStatus.textContent = "";
            startOverlay.classList.remove("hidden");
        };

        window.showReloadOverlay = showReloadOverlay;

        const requestFullscreenOnStart = async () => {
            const fullscreenTarget = document.documentElement;
            const requestFullscreen = fullscreenTarget.requestFullscreen
                || fullscreenTarget.webkitRequestFullscreen
                || fullscreenTarget.msRequestFullscreen;

            if (typeof requestFullscreen !== "function" || document.fullscreenElement) {
                return;
            }

            try {
                await requestFullscreen.call(fullscreenTarget);
            } catch (error) {
                console.warn("Fullscreen request failed", error);
            }
        };

        window.addEventListener("pointerdown", (event) => {
            if (event.pointerType === "touch") {
                touchRegisteredForFullscreen = true;
            }
        }, { passive: true });

        window.addEventListener("touchstart", () => {
            touchRegisteredForFullscreen = true;
        }, { passive: true });

        const tryStartGame = () => {
            if (!runtimeReady || !startRequested || mainStarted) {
                return;
            }

            mainStarted = true;
            startOverlay.classList.add("hidden");
            touchControlsApi.setEnabled(true);
            canvas.focus();

            let result;

            if (typeof Module.callMain === "function") {
                result = Module.callMain([]);
            } else if (typeof callMain === "function") {
                result = callMain([]);
            }

            return result;
        };

        var Module = {
            noInitialRun: true,
            canvas: (() => {
                canvas.addEventListener("click", () => canvas.focus());
                return canvas;
            })(),
            setStatus: (text) => {
                startStatus.textContent = text || "";
            },
            onRuntimeInitialized: () => {
                runtimeReady = true;
                startStatus.textContent = "Ready";
                tryStartGame();
            },
            onAbort: (reason) => {
                showReloadOverlay();
            },
            onExit: (reason) => {
                showReloadOverlay();
            }
        };

        startButton.addEventListener("click", () => {
            if (startButton.dataset.mode === "reload") {
                window.location.reload();
                return;
            }

            startRequested = true;
            startButton.textContent = "Press to Start";
            startButton.dataset.mode = "start";
            startPanelMessage.textContent = "Click to start the game and enable audio in the browser.";
            startStatus.textContent = runtimeReady ? "Starting..." : "Preparing...";
            if (touchRegisteredForFullscreen) {
                requestFullscreenOnStart();
            }
            tryStartGame();
        });
    </script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js?v=12").catch((error) => {
                    console.warn("Service worker registration failed", error);
                });
            });
        }
    </script>
    {{{ SCRIPT }}}
</body>
</html>
